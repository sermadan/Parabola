  - type_analytic
  opt_synthetic_type:
  - type_fusional
  opt_word_order:
  - SVO
sec_universal_features:
  bools:
    feat_gender: true
    feat_number: true
    feat_alignment: true
  settings:
    feat_gender:
    - gen_masculine
    - gen_feminine
    - gen_neutral
    feat_number:
    - num_singular
    - num_plural
    feat_alignment:
    - align_nominative
sec_noun_syntax:
  bools:
    feat_case: true
    feat_number: true
  settings:
    feat_case:
    - case_nominative
    - case_genitive
    - case_dative
    - case_accusative
    - case_instrumental
    - case_locative
    feat_number:
    - num_singular
sec_verb_syntax:
  bools:
    feat_tense: true
    feat_mood: true
  settings:
    feat_tense:
    - tense_past
    - tense_present
    feat_mood:
    - mood_imperative
    - mood_indicative
sec_adj_syntax:
  bools:
    feat_agreement: true
