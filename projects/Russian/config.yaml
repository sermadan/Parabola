morphology:
  sec_noun_syntax:
    selected_matrix_dims:
    - univ|feat_gender
    - univ|feat_number
    - local|feat_case
    markers:
      gen_masculine+num_singular+case_nominative:
      - marker: + ∅ / C_#
      gen_masculine+num_plural+case_nominative:
      - marker: "+ ɨ / H_#\r\n+ i / S_#"
      gen_feminine+num_singular+case_nominative:
      - marker: "+ a / H_#\r\n+ ja / S_#"
      gen_feminine+num_plural+case_nominative:
      - marker: "+ ɨ / H_#\r\n+ i / S_#"
      gen_neutral+num_singular+case_nominative:
