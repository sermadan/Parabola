# ==========================================
# IPA Phonology Configuration (Final Translation-Ready Version)
# ==========================================

# 1. 輔音部位 (Columns) - 對應 CSV: ipa_place_...
places: 
  - "ipa_place_bilabial"
  - "ipa_place_labiodental"
  - "ipa_place_dental"
  - "ipa_place_alveolar"
  - "ipa_place_postalveolar"
  - "ipa_place_alveolo_palatal"
  - "ipa_place_retroflex"
  - "ipa_place_palatal"
  - "ipa_place_velar"
  - "ipa_place_uvular"
  - "ipa_place_glottal"

# 2. 輔音方法 (Rows) - 對應 CSV: ipa_manner_...
consonant_methods: 
  - "ipa_manner_plosive"
  - "ipa_manner_affricate"
  - "ipa_manner_nasal"
  - "ipa_manner_trill"
  - "ipa_manner_tap"
  - "ipa_manner_fricative"
  - "ipa_manner_lat_fricative"
  - "ipa_manner_approximant"
  - "ipa_manner_lat_approximant"

# 3. 母音維度 (Rows/Cols) - 對應 CSV: ipa_height_... / ipa_backness_...
vowel_heights_list: 
  - "ipa_height_close"
  - "ipa_height_near_close"
  - "ipa_height_close_mid"
  - "ipa_height_mid"
  - "ipa_height_open_mid"
  - "ipa_height_near_open"
  - "ipa_height_open"

vowel_frontness: 
  - "ipa_backness_front"
  - "ipa_backness_central"
  - "ipa_backness_back"

# 4. 變音符號與分頁標籤 - 對應 CSV: ipa_... / ipa_...
diacritics:
  ipa_aspiration: { symbol: "ʰ", label: "ipa_aspiration", applies_to: "consonants" }
  ipa_palatalization: { symbol: "ʲ", label: "ipa_palatalization", applies_to: "consonants" }
  ipa_labialization: { symbol: "ʷ", label: "ipa_labialization", applies_to: "consonants" }
  ipa_nasalization: { symbol: "̃", label: "ipa_nasalization", applies_to: "vowels" }
  ipa_creaky: { symbol: "̰", label: "ipa_creaky", applies_to: "vowels" }
  ipa_long: { symbol: "ː", label: "ipa_long", applies_to: "vowels" }

