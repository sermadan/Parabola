# --- 1. 形態類型與基本語序 ---
"sec_morphology_type":
  settings:
    "opt_morphology": { type: single, options: ["type_analytic", "type_synthetic"] }
    "opt_synthetic_type": { type: single, options: ["type_agglutinative", "type_fusional", "type_polysynthetic"] }
    "opt_word_order": { type: single, options: ["SVO", "VSO", "VOS", "SOV", "OSV", "OVS", "V1", "V2"] }
    "opt_adposition_order": { type: single, options: ["preposition", "postposition", "circumposition", "inposition"] }

# --- 2. 通用功能 (形態維度的「定義池」) ---
"sec_universal_features":
  bools: ["feat_case", "feat_gender", "feat_number", "feat_person", "feat_clusivity", "feat_politeness", "feat_alignment"]
  settings:
    "feat_alignment": 
      type: single
      options: ["align_nominative", "align_ergative", "align_transitive", "align_active", "align_tripartite"]
    
    "feat_case": 
      type: multi
      groups:
        "grp_core": ["case_nominative", "case_accusative", "case_ergative", "case_absolutive", "case_agentive", "case_patientive", "case_direct", "case_oblique"]
        "grp_spatial": ["case_locative", "case_allative", "case_ablative", "case_elative", "case_illative", "case_perlative", "case_inessive", "case_adessive"]
        "grp_social": ["case_genitive", "case_dative", "case_instrumental", "case_comitative", "case_vocative"]
        "grp_abstract": ["case_essive", "case_translative", "case_partitive", "case_causal", "case_final", "case_equative"]
    
    "feat_gender": { type: multi, options: ["gen_masculine", "gen_feminine", "gen_neuter", "gen_animate", "gen_inanimate"] }
    "feat_number": { type: multi, options: ["num_singular", "num_dual", "num_trial", "num_plural", "num_paucal"] }
    "feat_person": { type: multi, options: ["per_1st", "per_1st_inc", "per_1st_exc", "per_2nd", "per_2nd_pol", "per_3rd", "per_4th"] }

# --- 3. 名詞語法 (決定維度如何套用到名詞) ---
"sec_noun_syntax":
  bools: ["feat_case", "feat_number", "feat_gender", "feat_person", "feat_definiteness", "feat_possession"]
  settings:
    "feat_case_marking": { type: single, options: ["mark_affix", "mark_clitic", "mark_adposition", "mark_none"] }
    "feat_definiteness": { type: multi, options: ["def_definite", "def_indefinite", "def_partitive"] }
    "feat_possession": { type: multi, options: ["poss_alienable", "poss_inalienable"] }

# --- 4. 動詞語法 (決定維度如何套用到動詞) ---
"sec_verb_syntax":
  bools: ["feat_tense", "feat_mood", "feat_aspect", "feat_voice", "feat_negation", "feat_person", "feat_number", "feat_gender"]
  settings:
    "feat_tense": { type: multi, options: ["tense_present", "tense_past", "tense_future", "tense_rem_past", "tense_imm_future"] }
    "feat_aspect": { type: multi, options: ["aspect_perf", "aspect_imperf", "aspect_prog", "aspect_hab", "aspect_iter"] }
    "feat_mood": { type: multi, options: ["mood_ind", "mood_imp", "mood_subj", "mood_cond", "mood_opt"] }
    "feat_voice": { type: multi, options: ["voice_act", "voice_pass", "voice_mid", "voice_caus", "voice_antipass"] }
    "feat_negation_mark": { type: single, options: ["neg_affix", "neg_particle", "neg_auxiliary"] }
    
    # 這裡不再用 v_gen_agree_subj，而是讓使用者直接勾選要「一致」的對象屬性
    "rule_agreement_target": { type: multi, options: ["target_subject", "target_object", "target_indirect_object"] }

# --- 5. 形容詞語法 ---
"sec_adj_syntax":
  bools: ["feat_comparison", "feat_case", "feat_number", "feat_gender"]
  settings:
    "feat_comparison": { type: multi, options: ["comp_positive", "comp_comparative", "comp_superlative", "comp_equative"] }
    "rule_match_type": { type: single, options: ["match_congruent", "match_fixed"] }