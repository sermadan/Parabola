{% extends "layout.html" %}

{% block page_name %}
    <span data-i18n="nav_project_management"></span>
{% endblock %}

{% block content %}
<div class="grid-auto-layout" style="margin-top: 20px;">

    <div class="card" style="border: 1px dashed var(--primary); background: var(--primary-glass); display: flex; flex-direction: column; justify-content: space-between;">
        <div>
            <h3 style="margin: 0 0 10px 0; color: var(--primary);">✨ <span data-i18n="label_create_new_project"></span></h3>
            <p class="label-caps" data-i18n="label_project_name_hint"></p>
        </div>
        
        <form action="{{ url_for('portal') }}" method="POST" style="margin-top: 15px;">
            <input type="text" name="project_name" required 
                   class="inplace-input" 
                   style="margin-bottom: 12px; width: 100%;"
                   placeholder="e.g. Project_A"
                   pattern="[a-zA-Z0-9_-]+">
            <button type="submit" class="btn btn-save" style="width: 100%;">
                <span data-i18n="btn_create_and_switch"></span>
            </button>
        </form>
    </div>

    {% for p in projects %}
    <div class="card" style="position: relative; display: flex; flex-direction: column; justify-content: space-between; {% if p == current %}border: 2px solid var(--primary); background: var(--primary-glass);{% endif %}">
        
        {% if p == current %}
            <div class="count-pill" style="position: absolute; top: 12px; right: 12px; height: 24px; padding: 0 8px; font-size: 0.7rem;">
                <span data-i18n="status_in_use"></span>
            </div>
        {% endif %}

        <div>
            <h3 style="margin: 0 0 5px 0; color: var(--text-main); font-size: 1.25rem;">{{ p }}</h3>
            <span class="label-caps">Project Repository</span>
        </div>

        <div class="action-group" style="margin-top: 25px;">
            <a href="{{ url_for('select_project', name=p) }}" 
               class="btn {% if p == current %}btn-save{% else %}btn-outline{% endif %}" 
               style="width: 100%;">
                <span data-i18n="btn_switch_to"></span>
            </a>
        </div>
    </div>
    {% else %}
    <div style="grid-column: 1 / -1; text-align: center; padding: 60px; opacity: 0.6;">
        <p class="label-caps" data-i18n="msg_no_projects"></p>
    </div>
    {% endfor %}

</div>
{% endblock %}
