<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}{% if self.title() %} | {% endif %}{{ app_name }}</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    
    {% block extra_css %}{% endblock %}
<style>
    .sidebar-header a {
        display: flex;
        align-items: center;
        gap: 15px;

        text-decoration: none;
        color: inherit;
        width: 100%;       /* 確保佔滿側邊欄寬度 */
    }

    .sidebar-header [data-i18n="app_title"] {
        font-size: 1.5rem;    /* 讓字體變大 (1.5倍) */
    }

    .sidebar-logo {
        flex-shrink: 0;
        /* 如果文字變大，圖示也可以稍微等比例調大一點點 */
        width: 32px; 
        height: auto;
    }
</style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <center>
            <a href="/">
                <span data-i18n="app_title" style="margin-left: 10px;"></span>
                <svg viewBox="0 0 400 350" width="24" height="20" class="sidebar-logo" style="overflow: visible;">
                    <path
                        fill="none" 
                        stroke="currentColor" 
                        stroke-width="40" 
                        stroke-linecap="round" 
                        stroke-linejoin="round"
                        d="M 20,20 Q 200,650 380,20" />
                </svg>
            </a>
            </center>
        </div>
        <ul class="nav-list">
            <li class="nav-item {% if request.path == '/guide' %}active{% endif %}">
                <a href="/guide"><span data-i18n="nav_guide"></span></a>
            </li>
            <li class="nav-item {% if request.path == '/syntax' %}active{% endif %}">
                <a href="/syntax"><span data-i18n="nav_syntax_config"></span></a>
            </li>
            <li class="nav-item {% if request.path == '/ipa' %}active{% endif %}">
                <a href="/ipa"><span data-i18n="nav_ipa_system"></span></a>
            </li>
            <li class="nav-item {% if request.path == '/ipa_management' %}active{% endif %}">
                <a href="/ipa_management"><span data-i18n="nav_ipa_management"></span></a>
            </li>
            <li class="nav-item {% if request.path == '/lexicon' %}active{% endif %}">
                <a href="/lexicon"><span data-i18n="nav_word_generator"></span></a>
            </li>
            <li class="nav-item {% if request.path == '/dictionary' %}active{% endif %}">
                <a href="/dictionary"><span data-i18n="nav_dictionary"></span></a>
            </li>
            
            <li class="nav-item {% if request.path == '/morphology' %}active{% endif %}">
                <a href="/morphology"><span data-i18n="nav_morphology_management"></span></a>
            </li>

            {% if session.get('current_project') %}
            <div class="project-indicator">
                <div class="indicator-label">
                    <span>📍</span>
                    <span data-i18n="label_current_project"></span>
                </div>
                <strong>{{ session.get('current_project') }}</strong>
            </div>
            {% endif %}
        </ul>
    </aside>

    <div class="main">
        <header class="top-bar">
            <div class="page-title-area">{% block page_name %}{% endblock %}</div>
            <div class="actions">
                <div class="lang-switcher">
                    <button type="button" onclick="updateLangMode('zh')" class="btn-lang" id="btn-zh">中</button>
                    <button type="button" onclick="updateLangMode('en')" class="btn-lang" id="btn-en">EN</button>
                </div>
                {% block actions %}{% endblock %}
            </div>
        </header>

        <div class="content-wrapper">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script>window.TRANSLATION_URL = "{{ url_for('static', filename='csv/translations.csv') }}";</script>
    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
</body>
</html>
