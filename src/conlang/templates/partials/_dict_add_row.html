<tr id="addRow" style="display: none; background: var(--primary-glass);">
    <td>
        <input type="text" id="new-word" class="inplace-input font-bold" 
               data-i18n-placeholder="dict_placeholder_word" placeholder="Word...">
    </td>

    <td>
        <select id="new-pos" class="inplace-input">
            <option value="noun" data-i18n="pos_noun"></option>
            <option value="verb" data-i18n="pos_verb"></option>
            <option value="adj" data-i18n="pos_adj"></option>
            <option value="adv" data-i18n="pos_adv"></option>
        </select>
    </td>

    <td>
        <input type="text" id="new-translation" class="inplace-input" 
               data-i18n-placeholder="dict_placeholder_meaning" placeholder="Meaning...">
    </td>

    <td>
        <input type="text" id="new-ipa" class="inplace-input phonetic" 
               data-i18n-placeholder="dict_placeholder_ipa" placeholder="IPA...">
    </td>

    <td>
        <input type="text" id="new-notes" class="inplace-input" 
               data-i18n-placeholder="dict_placeholder_notes" placeholder="Notes...">
    </td>

    <td style="text-align: right;">
        <div class="action-group" style="justify-content: flex-end;">
            <button onclick="saveNewWord()" class="btn-icon btn-save-sm" title="Confirm">✅</button>
            <button onclick="hideAddRow()" class="btn-icon btn-cancel-sm" title="Cancel">❌</button>
        </div>
    </td>
</tr>
