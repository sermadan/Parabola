<tr class="dict-row" id="row-{{ index }}">
    <td>
        <div class="view-mode-{{ index }}">
            <strong class="word-main">{{ entry.word }}</strong>
        </div>
        <div class="edit-mode-{{ index }}" style="display: none;">
            <input type="text" class="inplace-input font-bold" name="word" value="{{ entry.word }}">
        </div>
    </td>

    <td>
        <div class="view-mode-{{ index }}">
            <span class="pos-tag" data-i18n="pos_{{ entry.pos }}"></span>
        </div>
        <div class="edit-mode-{{ index }}" style="display: none;">
            <select class="inplace-input" name="pos">
                <option value="noun" {% if entry.pos == 'noun' %}selected{% endif %} data-i18n="pos_noun"></option>
                <option value="verb" {% if entry.pos == 'verb' %}selected{% endif %} data-i18n="pos_verb"></option>
                <option value="adj" {% if entry.pos == 'adj' %}selected{% endif %} data-i18n="pos_adj"></option>
                <option value="adv" {% if entry.pos == 'adv' %}selected{% endif %} data-i18n="pos_adv"></option>
                <option value="pron" {% if entry.pos == 'pron' %}selected{% endif %} data-i18n="pos_pron"></option>
                <option value="prep" {% if entry.pos == 'prep' %}selected{% endif %} data-i18n="pos_prep"></option>
                <option value="conj" {% if entry.pos == 'conj' %}selected{% endif %} data-i18n="pos_conj"></option>
                <option value="det" {% if entry.pos == 'det' %}selected{% endif %} data-i18n="pos_det"></option>
                <option value="num" {% if entry.pos == 'num' %}selected{% endif %} data-i18n="pos_num"></option>
                <option value="int" {% if entry.pos == 'int' %}selected{% endif %} data-i18n="pos_int"></option>
                <option value="aux" {% if entry.pos == 'aux' %}selected{% endif %} data-i18n="pos_aux"></option>
                <option value="part" {% if entry.pos == 'part' %}selected{% endif %} data-i18n="pos_part"></option>
                <option value="punct" {% if entry.pos == 'punct' %}selected{% endif %} data-i18n="pos_punct"></option>
            </select>
        </div>
    </td>

    <td>
        <div class="view-mode-{{ index }}">
            <span class="word-sub">{{ entry.translation }}</span>
        </div>
        <div class="edit-mode-{{ index }}" style="display: none;">
            <input type="text" class="inplace-input" name="translation" value="{{ entry.translation }}">
        </div>
    </td>

    <td>
        <div class="view-mode-{{ index }}">
            <span class="phonetic">/{{ entry.ipa }}/</span>
        </div>
        <div class="edit-mode-{{ index }}" style="display: none;">
            <input type="text" class="inplace-input phonetic" name="ipa" value="{{ entry.ipa }}">
        </div>
    </td>

    <td>
        <div class="view-mode-{{ index }}">
            <span class="word-notes" style="color: #666; font-size: 0.9rem;">{{ entry.notes or '' }}</span>
        </div>
        <div class="edit-mode-{{ index }}" style="display: none;">
            <input type="text" class="inplace-input" name="notes" value="{{ entry.notes or '' }}">
        </div>
    </td>

    <td style="text-align: right;">
        <div class="action-group">
            <div class="view-mode-{{ index }}">
                <button onclick="toggleEdit({{ index }})" class="btn-icon" title="Edit">✏️</button>
            </div>
            
            <div class="edit-mode-{{ index }}" style="display: none; gap: 4px;">
                <button onclick="saveRow({{ index }})" class="btn-icon btn-save-sm" title="Save" data-i18n="btn_V"></button>
                <button onclick="toggleEdit({{ index }})" class="btn-icon btn-cancel-sm" title="Cancel" data-i18n="btn_X"></button>
                <button onclick="deleteRow({{ index }})" class="btn-icon btn-delete-sm" title="Delete" data-i18n="btn_trash"></button>
            </div>
        </div>
    </td>
</tr>
