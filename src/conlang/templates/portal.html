{% extends "layout.html" %}

{% block page_name %}
    <span data-i18n="nav_project_management"></span>
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
<style>
    /* 容器佈局 */
    .hub-container {
        display: flex;
        gap: 30px;
        align-items: flex-start;
        margin-top: 10px;
    }

    /* 左側側邊欄 */
    .control-sidebar {
        width: 320px;
        flex-shrink: 0;
        position: sticky;
        top: 20px;
    }

    /* 右側主面板 */
    .workspace-main {
        flex-grow: 1;
    }

    .workspace-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
    }

    /* 工作區卡片 */
    .workspace-item {
        position: relative;
        padding: 24px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #ffffff;
        transition: all 0.2s ease;
        display: flex;
        flex-direction: column;
        cursor: pointer;
    }

    .workspace-item:hover {
        border-color: var(--text-sub);
    }

    .workspace-item.active {
        border-color: var(--primary);
        background: var(--primary-glass);
        box-shadow: 0 4px 12px var(--primary-glass);
    }

    /* 專案頭像 */
    .project-avatar {
        width: 48px;
        height: 48px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 16px;
        border: 1px solid var(--border);
        background: var(--bg-card);
        color: var(--primary);
    }

    .workspace-item.active .project-avatar {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
    }

    /* 狀態標籤 */
    .status-badge {
        position: absolute;
        top: 15px;
        right: 15px;
    }

    .active-pill {
        background: var(--primary);
        color: white;
        padding: 2px 10px;
        border-radius: 50px;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
    }

    /* 輔助文字 */
    .project-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 4px;
    }

    /* 空狀態 */
    .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 80px 0;
        background: var(--bg-card);
        border-radius: 12px;
        border: 2px dashed var(--border);
        color: var(--text-sub);
    }
</style>
{% endblock %}

{% block content %}
<div class="hub-container">
    
    <aside class="control-sidebar">
        <div class="sort-section-card">
            <div style="text-align: center; margin-bottom: 24px;">
                <div style="font-size: 2rem; margin-bottom: 8px;">🚀</div>
                <h2 style="margin: 0; font-size: 1.2rem; color: var(--text-main);" data-i18n="label_new_workspace"></h2>
            </div>

            <form action="{{ url_for('views.portal') }}" method="POST">
                <div style="margin-bottom: 20px;">
                    <label class="label-caps" data-i18n="label_project_name"></label>
                    <input type="text" name="project_name" required 
                           class="inplace-input" 
                           placeholder="e.g. Project_2026"
                           pattern="[a-zA-Z0-9_-]+">
                    <small class="label-caps" style="margin-top: 8px; text-transform: none; font-weight: 400;" data-i18n="label_project_name_hint"></small>
                </div>
                
                <button type="submit" class="btn btn-save" style="width: 100%; justify-content: center;">
                    <span data-i18n="btn_create_and_switch"></span>
                </button>
            </form>
            
            <div style="margin-top: 24px; padding-top: 20px; border-top: 1px dashed var(--border);">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="label-caps" style="margin: 0;" data-i18n="label_total_projects"></span>
                    <span class="count-pill">{{ projects|length }}</span>
                </div>
            </div>
        </div>
    </aside>

    <main class="workspace-main">
        <div class="section-header" style="margin-top: 0; border: none;">
            <h2 data-i18n="label_existing_workspaces"></h2>
        </div>

        <div class="workspace-grid">
            {% for p in projects %}
            <div class="workspace-item {% if p == current %}active{% endif %}" 
                onclick="window.location.href='{{ url_for('views.select_project', name=p) }}';">
                
                {% if p == current %}
                <div class="status-badge">
                    <span class="active-pill" data-i18n="status_in_use"></span>
                </div>
                {% endif %}

                <div class="project-avatar">
                    {{ p[0] | upper }}
                </div>

                <div style="margin-bottom: 20px;">
                    <h3 style="margin: 0; font-size: 1.15rem; color: var(--text-main); word-break: break-all;">{{ p }}</h3>
                    <div class="project-meta">
                        <span class="dot {% if p == current %}active{% else %}inactive{% endif %}"></span>
                        <span class="label-caps" style="margin: 0; opacity: 0.6; font-size: 0.7rem;" data-i18n="label_local_workspace"></span>
                    </div>
                </div>

                <div style="margin-top: auto; padding-top: 15px; border-top: 1px solid rgba(0,0,0,0.03);">
                    <button class="btn {% if p == current %}btn-save{% else %}btn-outline{% endif %}" style="width: 100%; border-radius: 8px; justify-content: center;">
                        <span data-i18n="btn_switch_to"></span>
                    </button>
                </div>
            </div>
            {% else %}
            <div class="empty-state">
                <div style="font-size: 3rem; margin-bottom: 12px; opacity: 0.5;">📁</div>
                <p class="label-caps" style="margin: 0;" data-i18n="msg_no_workspaces"></p>
            </div>
            {% endfor %}
        </div>
    </main>
</div>
{% endblock %}
