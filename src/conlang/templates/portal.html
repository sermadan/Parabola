{% extends "layout.html" %}

{% block page_name %}
    <span data-i18n="nav_project_management"></span>
{% endblock %}

{% block content %}
<div class="hub-container" style="display: flex; gap: 30px; align-items: flex-start; margin-top: 10px;">
    
    <div class="control-sidebar" style="width: 320px; flex-shrink: 0; position: sticky; top: 20px;">
        <div class="sort-section-card" style="padding: 30px; border-radius: 20px;">
            <div style="text-align: center; margin-bottom: 25px;">
                <div style="font-size: 2.5rem; margin-bottom: 10px;">🚀</div>
                <h2 style="margin: 0; font-size: 1.4rem; color: var(--text-main);" data-i18n="label_new_workspace"></h2>
                <p class="label-caps" style="margin-top: 8px;" data-i18n="label_project_name_hint"></p>
            </div>

            <form action="{{ url_for('portal') }}" method="POST">
                <div style="margin-bottom: 20px;">
                    <label class="label-caps" data-i18n="label_project_name"></label>
                    <input type="text" name="project_name" required 
                           class="inplace-input" 
                           style="height: 48px; border-radius: 12px;"
                           placeholder="e.g. My_Project_2026"
                           pattern="[a-zA-Z0-9_-]+">
                </div>
                <button type="submit" class="btn btn-save" style="width: 100%; height: 48px; border-radius: 12px; justify-content: center;">
                    <span data-i18n="btn_create_and_switch"></span>
                </button>
            </form>
            
            <div style="margin-top: 30px; padding-top: 20px; border-top: 1px dashed var(--border);">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="label-caps" style="margin: 0;" data-i18n="label_total_projects"></span>
                    <span class="count-pill">{{ projects|length }}</span>
                </div>
            </div>
        </div>
    </div>

    <div class="workspace-main" style="flex-grow: 1;">
        <div class="section-header" style="margin-top: 0; border: none;">
            <h2 data-i18n="label_existing_workspaces"></h2>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
            {% for p in projects %}
            <div class="card workspace-item {% if p == current %}editing{% endif %}" 
                 style="position: relative; padding: 25px; border-radius: 16px; border: 1px solid var(--border); transition: all 0.3s ease;
                        {% if p == current %} background: var(--primary-glass); box-shadow: 0 10px 25px var(--primary-glass); transform: translateY(-5px); border-color: var(--primary); {% else %} background: #ffffff; {% endif %}">
                
                {% if p == current %}
                <div style="position: absolute; top: 15px; right: 15px;">
                    <span class="count-pill" style="background: var(--primary); color: white;" data-i18n="status_in_use"></span>
                </div>
                {% endif %}

                <div class="project-avatar" style="width: 50px; height: 50px; border-radius: 12px; background: {% if p == current %}var(--primary){% else %}var(--bg-card){% endif %}; color: {% if p == current %}white{% else %}var(--primary){% endif %}; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; margin-bottom: 20px; border: 1px solid var(--border);">
                    {{ p[0] | upper }}
                </div>

                <div style="margin-bottom: 25px;">
                    <h3 style="margin: 0 0 5px 0; font-size: 1.25rem; color: var(--text-main); word-break: break-all;">{{ p }}</h3>
                    <div style="display: flex; align-items: center; gap: 6px;">
                        <span style="width: 6px; height: 6px; border-radius: 50%; background: {% if p == current %}#28a745{% else %}#ccc{% endif %};"></span>
                        <span class="label-caps" style="margin: 0; opacity: 0.6;" data-i18n="label_local_workspace"></span>
                    </div>
                </div>

                <div class="action-group" style="padding-top: 15px; border-top: 1px solid rgba(0,0,0,0.03);">
                    <a href="{{ url_for('select_project', name=p) }}" 
                       class="btn {% if p == current %}btn-save{% else %}btn-outline{% endif %}" 
                       style="width: 100%; border-radius: 10px; justify-content: center;">
                        <span data-i18n="btn_switch_to"></span>
                    </a>
                </div>
            </div>
            {% else %}
            <div style="grid-column: 1 / -1; text-align: center; padding: 100px 0; background: var(--bg-card); border-radius: 20px; border: 2px dashed var(--border);">
                <div style="font-size: 4rem; opacity: 0.3; margin-bottom: 15px;">📁</div>
                <p class="label-caps" data-i18n="msg_no_workspaces"></p>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
